services:
  flaskawow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flaskawow-landing
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - flaskawow_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  flaskawow_node_modules:
